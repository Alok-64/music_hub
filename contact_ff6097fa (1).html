<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#020202">

<title>Contact - Music Hub</title>
<style>
    *{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
    -webkit-tap-highlight-color:transparent;
}

html{
    scroll-behavior:smooth;
    -webkit-text-size-adjust:100%;
    text-size-adjust:100%;
}

body{
    position:relative;
    background:
        radial-gradient(circle at 32% 15%, rgba(255,255,255,0.04), transparent 14%),
        radial-gradient(circle at 75% 12%, rgba(255,255,255,0.06), transparent 12%),
        linear-gradient(135deg, #020202 0%, #070707 35%, #040405 100%);
    color:#ffffff;
    min-height:100vh;
    min-height:100dvh;
    overflow-x:hidden;
    -webkit-overflow-scrolling:touch;
    padding-top:env(safe-area-inset-top);
    padding-bottom:env(safe-area-inset-bottom);
    padding-left:env(safe-area-inset-left);
    padding-right:env(safe-area-inset-right);
}

/* Background Glow */

body::before{
    content:'';
    position:fixed;
    inset:0;
    background:
        radial-gradient(circle at 18% 18%, rgba(255,255,255,0.06), transparent 16%),
        radial-gradient(circle at 82% 20%, rgba(255,255,255,0.04), transparent 14%),
        repeating-linear-gradient(0deg, rgba(255,255,255,0.02), rgba(255,255,255,0.02) 1px, transparent 1px, transparent 28px),
        repeating-linear-gradient(90deg, rgba(255,255,255,0.02), rgba(255,255,255,0.02) 1px, transparent 1px, transparent 28px);
    filter:blur(0.75px);
    opacity:0.82;
    z-index:-3;
    pointer-events:none;
    animation: drift 12s ease-in-out infinite;
}

body::after{
    content:'';
    position:fixed;
    width:850px;
    height:850px;
    background:radial-gradient(circle, rgba(255,255,255,0.08), transparent 60%);
    border-radius:50%;
    top:-260px;
    right:-220px;
    filter:blur(180px);
    z-index:-2;
    pointer-events:none;
    animation: pulseGlow 7s ease-in-out infinite;
}

@keyframes drift {
    0%{ transform: translate(0, 0); }
    50%{ transform: translate(-15px, 10px); }
    100%{ transform: translate(0, 0); }
}

@keyframes pulseGlow {
    0%,100%{ transform: scale(1); opacity:0.95; }
    50%{ transform: scale(1.05); opacity:0.75; }
}

@keyframes scrollInFromLeft {
    from{
        opacity: 0;
        transform: translateX(-60px);
    }
    to{
        opacity: 1;
        transform: translateX(0);
    }
}

@keyframes floatScroll {
    0%{ transform: translateY(0px); }
    50%{ transform: translateY(-8px); }
    100%{ transform: translateY(0px); }
}

@keyframes slideUp {
    from{
        opacity: 0;
        transform: translateY(30px);
    }
    to{
        opacity: 1;
        transform: translateY(0);
    }
}

@keyframes fadeOut {
    from{ opacity: 1; }
    to{ opacity: 0; }
}

@keyframes fadeIn {
    from{ opacity: 0; }
    to{ opacity: 1; }
}

.page-transition {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: #020202;
    z-index: 9999;
    pointer-events: none;
    opacity: 0;
    animation: pageTransitionFadeIn 0.4s ease forwards;
}

@keyframes pageTransitionFadeIn {
    0%{ opacity: 1; }
    100%{ opacity: 0; }
}

body.transitioning {
    animation: bodyFadeOut 0.3s ease forwards;
}

@keyframes bodyFadeOut {
    from{ opacity: 1; }
    to{ opacity: 0; }
}

/* Header */

header{
    width:100%;
    padding:16px 5%;
    display:flex;
    justify-content:space-between;
    align-items:center;
    border-bottom:1px solid rgba(255,255,255,0.06);
    backdrop-filter:blur(10px);
    -webkit-backdrop-filter:blur(10px);
    position:sticky;
    top:0;
    z-index:100;
    background:rgba(2,2,2,0.85);
}

.logo{
    font-size:20px;
    font-weight:600;
    letter-spacing:1px;
}

.logo span{
    color:#9f9f9f;
}

.logo-link{
    color:inherit;
    text-decoration:none;
}

nav a{
    text-decoration:none;
    color:#bcbcbc;
    margin-left:24px;
    font-size:14px;
    transition:color 0.3s;
    display:inline-block;
    padding:8px 4px;
}

nav a:hover,
nav a.active{
    color:#ffffff;
}

/* Content Section */

.content-section{
    width:100%;
    max-width:1100px;
    margin:auto;
    padding:40px 5% 60px;
}

.section-title{
    font-size:clamp(32px, 6vw, 48px);
    margin-bottom:24px;
    color:#dcdcdc;
}

.section-text{
    color:#b3b3b3;
    line-height:1.8;
    max-width:800px;
    margin-bottom:32px;
    font-size:16px;
}

.contact-info{
    background:rgba(255,255,255,0.03);
    border:1px solid rgba(255,255,255,0.05);
    border-radius:16px;
    padding:24px;
    margin-bottom:20px;
    backdrop-filter:blur(10px);
    -webkit-backdrop-filter:blur(10px);
}

.contact-info h3{
    font-size:18px;
    margin-bottom:12px;
    color:#dcdcdc;
}

.contact-info p{
    color:#b3b3b3;
    line-height:1.8;
    margin-bottom:8px;
}

.contact-info a{
    color:#9fb5ff;
    text-decoration:none;
    display:inline-block;
    padding:4px 0;
    min-height:44px;
    line-height:36px;
}

.contact-info a:hover{
    text-decoration:underline;
}

.contact-info a:active{
    opacity:0.7;
}

.form-group{
    margin-bottom:20px;
}

.form-group label{
    display:block;
    margin-bottom:8px;
    color:#dcdcdc;
    font-weight:500;
}

.form-group input,
.form-group textarea{
    width:100%;
    max-width:600px;
    background:rgba(255,255,255,0.05);
    border:1px solid rgba(255,255,255,0.1);
    border-radius:10px;
    padding:12px;
    color:#ffffff;
    font-family:'Poppins',sans-serif;
    font-size:16px;
}

.form-group input::placeholder,
.form-group textarea::placeholder{
    color:#6d6d6d;
}

.form-group input:focus,
.form-group textarea:focus{
    outline:none;
    border-color:rgba(255,255,255,0.3);
}

.submit-btn{
    background:white;
    color:black;
    border:none;
    padding:14px 30px;
    border-radius:10px;
    cursor:pointer;
    font-weight:500;
    font-size:15px;
    transition:transform 0.2s, opacity 0.2s;
    min-height:44px;
}

.submit-btn:hover{
    transform:scale(1.03);
}

.submit-btn:active{
    transform:scale(0.96);
    opacity:0.8;
}

.submit-btn:disabled{
    opacity:0.6;
    cursor:not-allowed;
}

/* Footer */

footer{
    text-align:center;
    padding:20px 5%;
    padding-bottom:calc(20px + env(safe-area-inset-bottom));
    color:#5f5f5f;
    border-top:1px solid rgba(255,255,255,0.05);
    font-size:13px;
    margin-top:40px;
}

.toast-notification{
    position:fixed;
    left:50%;
    bottom:calc(24px + env(safe-area-inset-bottom));
    transform:translateX(-50%) translateY(20px);
    background:rgba(255,255,255,0.12);
    border:1px solid rgba(255,255,255,0.14);
    padding:12px 20px;
    border-radius:999px;
    color:#ffffff;
    backdrop-filter:blur(18px);
    -webkit-backdrop-filter:blur(18px);
    opacity:0;
    pointer-events:none;
    transition:opacity 0.25s ease, transform 0.25s ease;
    z-index:999;
    max-width:90vw;
    text-align:center;
    font-size:14px;
}

.toast-notification.visible{
    opacity:1;
    transform:translateX(-50%) translateY(0);
}

/* ===== TABLET (max 1024px) ===== */
@media(max-width:1024px){
    .content-section{
        padding:32px 5% 50px;
    }
}

/* ===== MOBILE (max 700px) ===== */
@media(max-width:700px){
    header{
        padding:14px 4%;
    }

    .logo{
        font-size:18px;
    }

    nav a{
        margin-left:16px;
        font-size:13px;
        padding:6px 2px;
    }

    .content-section{
        padding:24px 4% 40px;
    }

    .section-title{
        font-size:32px;
        margin-bottom:20px;
    }

    .section-text{
        font-size:15px;
        margin-bottom:24px;
    }

    .contact-info{
        padding:20px 16px;
        margin-bottom:16px;
        border-radius:14px;
    }

    .contact-info h3{
        font-size:17px;
        margin-bottom:10px;
    }

    .contact-info p{
        font-size:14px;
    }

    .contact-info a{
        font-size:14px;
        min-height:44px;
        line-height:36px;
    }

    .form-group input,
    .form-group textarea{
        font-size:16px;
        padding:14px 12px;
    }

    .submit-btn{
        width:100%;
        padding:14px 20px;
        font-size:16px;
    }

    footer{
        margin-top:30px;
    }
}

/* ===== SMALL MOBILE (max 400px) ===== */
@media(max-width:400px){
    .section-title{
        font-size:28px;
    }

    .section-text{
        font-size:14px;
    }

    .contact-info{
        padding:16px 14px;
    }

    .contact-info h3{
        font-size:16px;
    }
}

/* ===== LANDSCAPE ON SMALL DEVICES ===== */
@media(max-height:500px) and (orientation:landscape){
    .content-section{
        padding:20px 5% 30px;
    }

    .section-title{
        font-size:28px;
        margin-bottom:16px;
    }

    .section-text{
        margin-bottom:20px;
    }

    .contact-info{
        padding:16px;
        margin-bottom:14px;
    }
}

/* ===== REDUCE MOTION ===== */
@media(prefers-reduced-motion:reduce){
    *, *::before, *::after{
        animation-duration:0.01ms !important;
        animation-iteration-count:1 !important;
        transition-duration:0.01ms !important;
    }

    html{
        scroll-behavior:auto;
    }
}
</style>

<script src="https://cdn.emailjs.com/sdk/3.2/email.min.js"></script>
<script>
function showNotification(message) {
  const existingToast = document.querySelector('.toast-notification');
  if (existingToast) existingToast.remove();

  const toast = document.createElement('div');
  toast.className = 'toast-notification';
  toast.textContent = message;
  document.body.appendChild(toast);

  requestAnimationFrame(() => {
    toast.classList.add('visible');
  });

  setTimeout(() => {
    toast.classList.remove('visible');
    toast.addEventListener('transitionend', () => toast.remove(), { once: true });
  }, 2500);
}

function navigateWithTransition(url) {
  if (url === '#home' || url === 'html') {
    url = 'index.html';
  }
  
  document.body.style.animation = 'fadeOut 0.5s ease forwards';
  setTimeout(() => {
    window.location.href = url;
  }, 500);
}

const navLinks = document.querySelectorAll('.nav-link, .logo-link');
navLinks.forEach(link => {
  link.addEventListener('click', (event) => {
    const href = link.getAttribute('href');
    if (href && (href.endsWith('.html') || href.startsWith('#'))) {
      event.preventDefault();
      navigateWithTransition(href);
    }
  });
});

emailjs.init('');
const contactForm = document.getElementById('contact-form');
if (contactForm) {
  const submitButton = contactForm.querySelector('.submit-btn');
  if (submitButton) {
    contactForm.addEventListener('submit', (e) => {
      e.preventDefault();
      submitButton.disabled = true;
      submitButton.textContent = 'Sending...';

      emailjs.sendForm('YOUR_SERVICE_ID', 'YOUR_TEMPLATE_ID', '#contact-form')
        .then(() => {
          showNotification('Message sent successfully.');
          contactForm.reset();
          submitButton.textContent = 'Send Message';
          submitButton.disabled = false;
        }, (error) => {
          console.error('EmailJS error:', error);
          showNotification('Failed to send message. Please try again later.');
          submitButton.textContent = 'Send Message';
          submitButton.disabled = false;
        });
    });
  }
}
</script>
